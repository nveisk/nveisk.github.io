<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Strona na GitHubie</title>
    <style>
        /* Stylizacja CSS - żeby strona ładnie wyglądała */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        h1 { margin-bottom: 0.5rem; }
        p { font-size: 1.1rem; opacity: 0.9; }
        .status {
            display: inline-block;
            background: #4caf50;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sukces! 🚀</h1>
        <p>Moja pierwsza strona hostowana na <strong>GitHub Pages</strong> właśnie działa.</p>
        <div class="status">LIVE</div>
    </div>

</body>
</html>
